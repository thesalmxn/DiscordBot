services:
  discord-bot:
    build: .
    container_name: discord-task-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - TZ=Asia/Nicosia
      - DATA_DIR=/app/data
    volumes:
      # Only mount the data directory, not individual files
      - ./data:/app/data
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f bot.py || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bot-network:
    driver: bridge